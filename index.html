const UTH_FC={"Flusso":[{q:"Scommesse obbligatorie UTH?",a:"<strong>Ante + Blind</strong><br/>stesso importo entrambe"},{q:"Opzioni Play al Flop?",a:"<strong>Play 2x</strong> oppure <strong>Check</strong><br/>3x e 4x solo pre-Flop"},{q:"Banco NON qualifica.\nAnte, Play, Blind?",a:"Ante <strong>Push</strong><br/>Poi confronto comunque:<br/>Giocatore vince: Play <strong>1:1</strong> Blind <strong>tab.2</strong><br/>Banco vince: Play e Blind <strong>ritirate</strong>"},{q:"Blind: combinazione minima\nper ricevere il payout?",a:"<strong>Scala</strong> o superiore<br/>Sotto Scala = Push"},{q:"Si bruciano carte prima delle comuni?",a:"<strong>NO</strong><br/>Differenza col Texas classico"}],"Pagamenti":[{q:"Blind payout per Full House?",a:"<strong>3:1</strong>"},{q:"Blind payout per Colore?",a:"<strong>3:2</strong>"},{q:"Blind payout per Scala Reale?",a:"<strong>500:1</strong>"},{q:"Trips Bonus per Tris?",a:"<strong>3:1</strong><br/>indipendente dal banco"},{q:"Giocatore folda.\nIl Trips viene pagato?",a:"<strong>SI</strong><br/>Si valuta sulle 5 carte del Board"}]};

function Steps({steps,g}){
  return steps.map(([t,d,n],i)=>(
    <div key={i} className={"step "+g}>
      <div className={"snum "+g}>{i+1}</div>
      <div style={{flex:1}}>
        <div className="stitle">{t}</div>
        <div className="sdesc">{d}</div>
        {n?<div className={"snote "+g}>{n}</div>:null}
      </div>
    </div>
  ));
}

function FC({data,g}){
  const cats=Object.keys(data);
  const [cat,setCat]=useState(cats[0]);
  const [idx,setIdx]=useState(0);
  const [fl,setFl]=useState(false);
  const cards=data[cat];
  const card=cards[idx];
  function go(i){setIdx(i);setFl(false);}
  return(
    <div>
      <div className="fcc">{cats.map(c=><button key={c} className={"fcat"+g+(cat===c?" on":"")} onClick={()=>{setCat(c);setIdx(0);setFl(false);}}>{c}</button>)}</div>
      <div className="fcnt">{idx+1} / {cards.length}</div>
      <div className="fprog"><div className={"fpfill"+g} style={{width:((idx+1)/cards.length*100)+"%"}}/></div>
      <div className="fscene" onClick={()=>setFl(f=>!f)}>
        <div className={"finn"+(fl?" flipped":"")}>
          <div className={"fface ffront"+g}><div className="flbl">domanda</div><div className="fq" style={{whiteSpace:"pre-line"}}>{card.q}</div><div className="fhint">tocca per girare</div></div>
          <div className={"fface fback"+g}><div className="flbl">risposta</div><div className="fa" dangerouslySetInnerHTML={{__html:card.a}}/></div>
        </div>
      </div>
      <div className="fnav">
        <button className={"fbtn"+g} onClick={()=>go(idx-1)} disabled={idx===0}>Prec</button>
        <button className={"fflip"+g} onClick={()=>setFl(f=>!f)}>{fl?"Nascondi":"Mostra"}</button>
        <button className={"fbtn"+g} onClick={()=>go(idx+1)} disabled={idx===cards.length-1}>Succ</button>
      </div>
    </div>
  );
}

function RpCalc(){
  const [ante,setAnte]=useState("10");
  const [ph,setPh]=useState("tris");
  const [bh,setBh]=useState("coppia");
  const [hb,setHb]=useState(false);
  const [bhand,setBhand]=useState("colore");
  const [ha,setHa]=useState(false);
  const [samt,setSamt]=useState("10");
  const [hj,setHj]=useState(false);
  const [res,setRes]=useState(null);
  function calc(){
    const aN=parseFloat(ante)||0,bN=aN*2;
    let jN=0,jl="";
    if(hj){jN=-5;jl="-5 (gettone)";const jp=RP_JP_PAY[ph];if(jp){if(jp==="100%"){jl="100% Jackpot + Envy 500";jN=-5+0;}else if(jp==="25%"){jl="25% Jackpot + Envy 100";jN=-5+0;}else{jN=-5+jp;jl="+"+jp+" fissi (netto: "+(jp-5)+")";}}}
    const bq=bh!=="nq"&&RP_QUAL.includes(bh);
    const pv=HVALS[ph],bv=bh==="nq"?-1:HVALS[bh];
    let ar=0,br=0,sr=0,bon=0,al="",bl="",sl="",bol="";
    if(ph==="fold"){ar=-aN;al="Fold";bl="---";}
    else if(!bq){ar=aN;al="1:1";br=0;bl="Push";if(ha){sr=parseFloat(samt)||0;sl="Pagata 1:1";}}
    else if(pv>bv){ar=0;al="Push";br=bN*(RP_BMULT[ph]||1);bl=(RP_BMULT[ph]||1)+":1";if(ha){sr=parseFloat(samt)||0;sl="Push";}}
    else if(pv===bv){ar=0;al="Push";br=0;bl="Push";if(ha){sr=-(parseFloat(samt)||0)/2;sl="Egalite meta";}}
    else{ar=-aN;al="Perda";br=-bN;bl="Perda";if(ha){sr=-(parseFloat(samt)||0);sl="Perda";}}
    if(hb&&ph!=="fold"){const f=RP_BMAP[bhand];if(f){bon=f;bol=f.toLocaleString("it-IT")+" fissi";}else{bon=0;bol="Non qualificato";}}
    setRes({aN,bN,ar,br,sr,bon,jN,jl,al,bl,sl,bol,tot:ar+br+sr+bon+jN,bq});
  }
  const hO=Object.entries(HLBLS).map(([k,v])=><option key={k} value={k}>{v}</option>);
  const bHOrp=[<option key="nq" value="nq">Non Qualifica</option>,...Object.entries(HLBLS).filter(([k])=>k!=="fold"&&k!=="alta").map(([k,v])=><option key={k} value={k}>{v}</option>)];
  const bO=["scala","colore","full","poker","sc","sr","tris","doppia","coppia","asso_re"].map(k=><option key={k} value={k}>{HLBLS[k]}</option>);
  return(
    <div>
      <div className="cgrid">
        <div><div className="fl">Ante (euro)</div><input className="finp" type="number" value={ante} onChange={e=>setAnte(e.target.value)}/></div>
        <div><div className="fl">Mano Giocatore</div><select className="fsel" value={ph} onChange={e=>setPh(e.target.value)}>{hO}</select></div>
        <div><div className="fl">Mano Banco</div><select className="fsel" value={bh} onChange={e=>setBh(e.target.value)}>{bHOrp}</select></div>
        <div>
          <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:12,marginBottom:4}}><input type="checkbox" checked={ha} onChange={e=>setHa(e.target.checked)}/>Assicurazione</label>
          {ha?<input className="finp" type="number" value={samt} onChange={e=>setSamt(e.target.value)} placeholder="Importo"/>:null}
          <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:12,marginTop:6}}><input type="checkbox" checked={hb} onChange={e=>setHb(e.target.checked)}/>Bonus</label>
          {hb?<select className="fsel" style={{marginTop:4}} value={bhand} onChange={e=>setBhand(e.target.value)}>{bO}</select>:null}
          <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:12,marginTop:8}}><input type="checkbox" checked={hj} onChange={e=>setHj(e.target.checked)}/>Jackpot Progressive (5 €/CHF)</label>
        </div>
      </div>
      <button className="cbtnrp" onClick={calc}>CALCOLA</button>
      {res?<div className="res resrp">
        <div className="rtitlerp">ESITO</div>
        <div className="rrow"><span className="rl">Banco qualifica?</span><span className="rv" style={{color:res.bq?"#e07070":"#7ecba1"}}>{res.bq?"SI":"NO"}</span></div>
        <div className="rrow"><span className="rl">Ante ({res.aN})</span><span className={"rv "+(res.ar>0?"rvwin":res.ar<0?"rvlose":"rvpush")}>{res.al}</span></div>
        <div className="rrow"><span className="rl">Bet ({res.bN})</span><span className={"rv "+(res.br>0?"rvwin":res.br<0?"rvlose":"rvpush")}>{res.bl}</span></div>
        {ha?<div className="rrow"><span className="rl">Assicurazione</span><span className={"rv "+(res.sr>0?"rvwin":res.sr<0?"rvlose":"rvpush")}>{res.sl}</span></div>:null}
        {hb?<div className="rrow"><span className="rl">Bonus</span><span className={"rv "+(res.bon>0?"rvwin":"rvpush")}>{res.bol}</span></div>:null}
        {hj?<div className="rrow"><span className="rl">Jackpot (5 €/CHF)</span><span className={"rv "+(res.jN>-5?"rvwin":"rvlose")}>{res.jl}</span></div>:null}
        <div className="rtotrp"><span>Totale netto</span><span className={res.tot<0?"bigneg":"big"}>{res.tot>=0?"+":""}{res.tot.toFixed(2)}</span></div>
      </div>:null}
    </div>
  );
}

function UthCalc(){
  const [ante,setAnte]=useState("10");
  const [pm,setPm]=useState("3");
  const [ph,setPh]=useState("scala");
  const [bh,setBh]=useState("coppia");
  const [ht,setHt]=useState(false);
  const [tamt,setTamt]=useState(10);
  const [hj,setHj]=useState(false);
  const [res,setRes]=useState(null);
  function calc(){
    const aN=parseFloat(ante)||0,pN=aN*parseInt(pm),blN=aN,tN=ht?tamt:0;
    let jN=0,jl="";
    if(hj){jN=-5;jl="-5 (gettone)";const jp=UTH_JP_PAY[ph];if(jp){if(jp==="100%"){jl="100% Jackpot + Envy 500";jN=-5+0;}else if(jp==="25%"){jl="25% Jackpot + Envy 100";jN=-5+0;}else{jN=-5+jp;jl="+"+jp+" fissi (netto: "+(jp-5)+")";}}}
    const bq=bh!=="nq"&&HVALS[bh]>=2;
    const pv=HVALS[ph],bv=bh==="nq"?-1:HVALS[bh];
    let ar=0,pr=0,blr=0,tr=0,al="",pl="",bll="",tl="";
    if(!bq){ar=0;al="Push";if(pv>bv||bh==="nq"){pr=pN;pl="1:1";const bm=UTH_BM[ph];if(bm){blr=blN*bm;bll=bm===1.5?"3:2":bm+":1";}else{blr=0;bll="Push";}}else if(pv===bv){pr=0;pl="Push";blr=0;bll="Push";}else{pr=-pN;pl="Perda";blr=-blN;bll="Perda";}}
    else if(pv>bv){ar=aN;al="1:1";pr=pN;pl="1:1";const bm=UTH_BM[ph];if(bm){blr=blN*bm;bll=bm===1.5?"3:2":bm+":1";}else{blr=0;bll="Push";}}
    else if(pv===bv){ar=0;al="Push";pr=0;pl="Push";blr=0;bll="Push";}
    else{ar=-aN;al="Perda";pr=-pN;pl="Perda";blr=-blN;bll="Perda";}
    if(ht){const tm=UTH_TM[ph];if(tm){tr=tN*tm;tl=tm+":1 su "+tN+"€";}else{tr=0;tl="Non qualificato";}}
    setRes({aN,pN,blN,tN,jN,jl,ar,pr,blr,tr,al,pl,bll,tl,tot:ar+pr+blr+tr+jN,bq});
  }
  const hO=Object.entries(HLBLS).filter(([k])=>k!=="fold"&&k!=="asso_re"&&k!=="alta").map(([k,v])=><option key={k} value={k}>{v}</option>);
  const bHO=[<option key="nq" value="nq">Non Qualifica</option>,...Object.entries(HLBLS).filter(([k])=>k!=="fold"&&k!=="alta").map(([k,v])=><option key={k} value={k}>{v}</option>)];
  return(
    <div>
      <div className="cgrid">
        <div><div className="fl">Ante e Blind (euro)</div><input className="finp" type="number" value={ante} onChange={e=>setAnte(e.target.value)}/></div>
        <div><div className="fl">Moltiplicatore Play</div><select className="fsel" value={pm} onChange={e=>setPm(e.target.value)}><option value="4">4x pre-Flop</option><option value="3">3x pre-Flop</option><option value="2">2x Flop</option><option value="1">1x Turn e River</option></select></div>
        <div><div className="fl">Mano Giocatore</div><select className="fsel" value={ph} onChange={e=>setPh(e.target.value)}>{hO}</select></div>
        <div><div className="fl">Mano Banco</div><select className="fsel" value={bh} onChange={e=>setBh(e.target.value)}>{bHO}</select></div>
        <div><label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:12}}><input type="checkbox" checked={ht} onChange={e=>setHt(e.target.checked)}/>Trips Bonus</label>{ht?<div><div className="fl" style={{marginTop:6}}>Importo Trips</div><select className="fsel" value={tamt} onChange={e=>setTamt(parseInt(e.target.value))}><option value="10">10 €/CHF</option><option value="20">20 €/CHF</option><option value="30">30 €/CHF</option></select></div>:null}<label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:12,marginTop:8}}><input type="checkbox" checked={hj} onChange={e=>setHj(e.target.checked)}/>Jackpot Progressive (5 €/CHF)</label></div>
      </div>
      <button className="cbtnuth" onClick={calc}>CALCOLA</button>
      {res?<div className="res resuth">
        <div className="rtitleuth">ESITO</div>
        <div className="rrow"><span className="rl">Banco qualifica?</span><span className="rv" style={{color:res.bq?"#e07070":"#7ecba1"}}>{res.bq?"SI":"NO"}</span></div>
        <div className="rrow"><span className="rl">Ante ({res.aN})</span><span className={"rv "+(res.ar>0?"rvwin":res.ar<0?"rvlose":"rvpush")}>{res.al}</span></div>
        <div className="rrow"><span className="rl">Blind ({res.blN})</span><span className={"rv "+(res.blr>0?"rvwin":res.blr<0?"rvlose":"rvpush")}>{res.bll}</span></div>
        <div className="rrow"><span className="rl">Play ({res.pN})</span><span className={"rv "+(res.pr>0?"rvwin":res.pr<0?"rvlose":"rvpush")}>{res.pl}</span></div>
        {ht?<div className="rrow"><span className="rl">Trips ({tamt} €/CHF)</span><span className={"rv "+(res.tr>0?"rvwin":"rvpush")}>{res.tl}{res.tr>0?" = +"+res.tr.toFixed(2)+"€/CHF":""}</span></div>:null}{hj?<div className="rrow"><span className="rl">Jackpot (5 €/CHF)</span><span className={"rv "+(res.jN>-5?"rvwin":"rvlose")}>{res.jl}</span></div>:null}
        <div className="rtotuth"><span>Totale netto</span><span className={res.tot<0?"bigneg":"big"}>{res.tot>=0?"+":""}{res.tot.toFixed(2)}</span></div>
      </div>:null}
    </div>
  );
}

        {tab==="Mani"?<div className="card uth"><div className="ctitle uth">Ranking delle Mani</div><div className="alert alertuthi">Migliori 5 su 7 carte (2 hole + 5 board).</div><div className="hands">{HANDS.map(([n,ex,d,r],i)=><div key={n} className="hcard uth"><div className="hname uth">{n}</div><div className="hex">{ex}</div><div className="hdesc">{i===9?"Nessuna combinazione":d}</div><div style={{fontFamily:"Josefin Sans,sans-serif",fontSize:10,color:"rgba(13,120,110,0.45)",marginTop:3}}>{i===8?"9 - Qualifica banco":r}</div></div>)}</div></div>:null}
        {tab==="Pagamenti"?<div>
          <div className="card uth"><div className="ctitle uth">Esiti Showdown</div><table className="tbl"><thead><tr><th className="uth">Situazione</th><th className="uth">Ante</th><th className="uth">Play</th><th className="uth">Blind</th></tr></thead><tbody><tr><td>Banco NON qualifica</td><td className="payy">Push</td><td className="payt">1:1</td><td className="payt">Tab.2</td></tr><tr><td>Banco qualifica — Vince giocatore</td><td className="payg">1:1</td><td className="payg">1:1</td><td className="payt">Tab.2</td></tr><tr><td>Banco qualifica — Vince banco</td><td className="payr">Perda</td><td className="payr">Perda</td><td className="payr">Perda</td></tr><tr><td>Parita</td><td className="payy">Push</td><td className="payy">Push</td><td className="payy">Push</td></tr></tbody></table></div>
          <div className="card uth"><div className="ctitle uth">Tabella 2 — Blind (min. Scala)</div><div className="alert alertrpw">Sotto la Scala la Blind e sempre Push, anche se il giocatore vince.</div><table className="tbl"><thead><tr><th className="uth">Combinazione</th><th className="uth">Payout</th></tr></thead><tbody>{UTH_BLIND.map(([h,p])=><tr key={h}><td>{h}</td><td className={p==="Push"?"payy":"payt"}>{p}</td></tr>)}</tbody></table></div>
          <div className="card uth"><div className="ctitle uth">Tabella 3 — Trips Bonus</div><div className="alert alertuthi">Indipendente dal banco. Fold: vale sulle 5 carte Board.</div><table className="tbl"><thead><tr><th className="uth">Combinazione</th><th className="uth">Payout</th></tr></thead><tbody>{UTH_TRIPS.map(([h,p])=><tr key={h}><td>{h}</td><td className="payt">{p}</td></tr>)}</tbody></table></div>
        </div>:null}
        {tab==="Simulatore"?<div className="card uth"><div className="ctitle uth">Simulatore Payout</div><UthCalc/></div>:null}
        {tab==="Prompt"?<div className="card uth"><div className="ctitle uth">Prompt Card</div><div className="pc">
          <div className="pciuth"><h4 className="pcih4uth">Qualifica Banco</h4><p className="pcip">Almeno una <strong>Coppia</strong><br/>Sotto <span className="tagy">NO QUALIFICA</span></p></div>
          <div className="pciuth"><h4 className="pcih4uth">Banco NON qualifica</h4><p className="pcip">Ante <span className="tagy">PUSH</span><br/>Poi confronto normale:<br/>Giocatore vince: Play <span className="tagg">1:1</span> Blind <span className="tagt">Tab.2</span><br/>Banco vince: Play e Blind <span className="tagr">ritirate</span></p></div>
          <div className="pciuth"><h4 className="pcih4uth">Banco qualifica — Giocatore vince</h4><p className="pcip">Ante <span className="tagg">1:1</span> Play <span className="tagg">1:1</span> Blind <span className="tagt">Tab.2</span></p></div>
          <div className="pciuth"><h4 className="pcih4uth">Banco qualifica — Banco vince</h4><p className="pcip">Ante <span className="tagr">PERDA</span> Play <span className="tagr">PERDA</span> Blind <span className="tagr">PERDA</span></p></div>
          <div className="pciuth"><h4 className="pcih4uth">Blind — min. payout</h4><p className="pcip">Serve almeno <strong>Scala</strong><br/>Sotto Scala <span className="tagy">PUSH</span></p></div>
          <div className="pciuth"><h4 className="pcih4uth">Opzioni Play</h4><p className="pcip">Pre-Flop <span className="tagg">3x o 4x</span><br/>Flop <span className="tagt">2x</span> Turn/River <span className="tagy">1x</span> o <span className="tagr">Fold</span></p></div>
          <div className="pciuth"><h4 className="pcih4uth">Trips Bonus</h4><p className="pcip">Da <strong>Tris</strong> in su<br/>Fold: vale sul <strong>Board</strong></p></div>
          <div className="pciuth"><h4 className="pcih4uth">NO Bruciata</h4><p className="pcip">NON si bruciano carte<br/>prima delle comuni</p></div>
        </div></div>:null}
        {tab==="Flashcard"?<div className="card uth"><div className="ctitle uth">Flashcard</div><FC data={UTH_FC} g={g}/></div>:null}
      </div>
    </div>
  );
}

function App(){
  const [game,setGame]=useState("russian");
  return(
    <div className="app">
      <nav className="topbar">
        <div className="logo">Dealer Reference</div>
        <div className="game-btns">
          <button className={"gbtn rp"+(game==="russian"?" on":"")} onClick={()=>setGame("russian")}>Russian Poker</button>
          <button className={"gbtn uth"+(game==="uth"?" on":"")} onClick={()=>setGame("uth")}>UTH</button>
        </div>
      </nav>
      {game==="russian"?<RPGame/>:<UTHGame/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
